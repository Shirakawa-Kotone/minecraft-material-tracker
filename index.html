<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft 建材清单 · 材料与去向</title>
<style>
:root{--bg:#1a1a2e;--surface:#16213e;--card:#1e2a4a;--card-hover:#253558;--accent:#e0a832;--accent2:#5c9e5c;--text:#e8e0d4;--text-muted:#9a8e7a;--border:#2a3a5a;--danger:#c0392b;--success:#27ae60;--done-bg:#0d2818;--done-border:#1a4a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#0f0f23,#1a1a3e,#0f0f23);border-bottom:2px solid var(--accent);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.header h1{font-size:24px;display:flex;align-items:center;gap:10px}
.header-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#1a1a2e}
.btn-primary:hover{background:#f0b842;transform:translateY(-1px)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--card-hover)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#2ecc71}
.main{max-width:1400px;margin:0 auto;padding:20px}
.upload-area{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;margin-bottom:24px;transition:all .3s;cursor:pointer}
.upload-area.dragover{border-color:var(--accent);background:rgba(224,168,50,.08)}
.upload-area .icon{font-size:48px;margin-bottom:12px}
.upload-area h2{font-size:20px;margin-bottom:8px}
.upload-area p{color:var(--text-muted);font-size:14px}
.upload-area .hint{margin-top:12px;font-size:12px;color:var(--text-muted)}
.upload-area input[type="file"]{display:none}
.stats-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.stat-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 20px;display:flex;align-items:center;gap:10px;flex:1;min-width:120px}
.stat-item .num{font-size:28px;font-weight:700;color:var(--accent)}
.stat-item .label{font-size:13px;color:var(--text-muted)}
.stat-item .sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.search-box{flex:1;min-width:200px;padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px}
.search-box:focus{outline:none;border-color:var(--accent)}
.search-box::placeholder{color:var(--text-muted)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-tag{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;transition:all .2s}
.filter-tag:hover{border-color:var(--accent);color:var(--accent)}
.filter-tag.active{background:var(--accent);color:#1a1a2e;border-color:var(--accent);font-weight:600}
.view-toggle{display:flex;gap:4px;background:var(--surface);border-radius:6px;padding:3px;border:1px solid var(--border)}
.view-toggle button{padding:5px 10px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-radius:4px;font-size:13px;transition:all .2s}
.view-toggle button.active{background:var(--card);color:var(--text)}
.material-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .25s}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card.collected{background:var(--done-bg);border-color:var(--done-border);opacity:.85}
.card.collected:hover{border-color:var(--success);opacity:1}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent)}
.card-header .checkbox{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;font-size:14px}
.card-header .checkbox:hover{border-color:var(--accent)}
.card-header .checkbox.checked{background:var(--success);border-color:var(--success)}
.card-header .item-icon{width:48px;height:48px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1px solid var(--border);image-rendering:pixelated}
.card-header .item-icon img{width:100%;height:100%;object-fit:contain}
.card-header .item-icon .fallback{font-size:20px;color:var(--text-muted)}
.card-info{flex:1;min-width:0}
.card-info .name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info .sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.card-info .sub .item-id{font-family:monospace;font-size:11px;opacity:.6}
.card-qty{font-size:22px;font-weight:700;color:var(--accent);min-width:50px;text-align:right}
.card-qty .unit{font-size:12px;font-weight:400;color:var(--text-muted)}
.card-breakdown{font-size:12px;color:var(--accent2);margin-top:2px;cursor:pointer}
.card-breakdown:hover{text-decoration:underline}
.card-expand{padding:0 16px 14px}
.card-arrow{color:var(--text-muted);font-size:18px;transition:transform .3s}
.card-arrow.open{transform:rotate(180deg)}
.results-table{width:100%;border-collapse:collapse;margin-top:8px}
.results-table th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--text-muted);padding:6px 8px;border-bottom:1px solid var(--border);font-weight:600;letter-spacing:.5px}
.results-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;vertical-align:middle}
.results-table tr:last-child td{border-bottom:none}
.results-table .result-item{display:flex;align-items:center;gap:8px}
.results-table .result-item .mini-icon{width:24px;height:24px;border-radius:4px;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;image-rendering:pixelated}
.results-table .result-item .mini-icon img{width:100%;height:100%;object-fit:contain}
.result-qty{font-weight:600;text-align:right;color:var(--accent2);white-space:nowrap}
.result-ratio{font-size:11px;color:var(--text-muted);text-align:right}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.empty-state h3{font-size:20px;margin-bottom:8px;color:var(--text)}
.empty-state p{font-size:14px;max-width:400px;margin:0 auto}
.data-source-info{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.group-section{margin-bottom:28px}
.group-title{font-size:16px;font-weight:700;padding:8px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.group-title .count{font-size:12px;font-weight:400;color:var(--text-muted)}
.group-title .progress{font-size:12px;color:var(--accent2);margin-left:auto}
.completed-badge{display:inline-block;padding:2px 8px;border-radius:10px;background:var(--success);color:#fff;font-size:11px;font-weight:600;margin-left:8px}
.table-view{width:100%;border-collapse:collapse;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.table-view th{background:var(--surface);padding:12px 14px;text-align:left;font-size:12px;text-transform:uppercase;color:var(--text-muted);letter-spacing:.5px;font-weight:600;border-bottom:2px solid var(--border)}
.table-view td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;vertical-align:middle}
.table-view tr:hover td{background:rgba(255,255,255,.02)}
.table-view .mini-icon-table{width:32px;height:32px;border-radius:4px;background:var(--surface);display:inline-flex;align-items:center;justify-content:center;overflow:hidden;vertical-align:middle;margin-right:10px;image-rendering:pixelated}
.table-view .mini-icon-table img{width:100%;height:100%;object-fit:contain}
.toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 20px;font-size:14px;box-shadow:0 4px 12px rgba(0,0,0,.4);animation:slideIn .3s ease;max-width:360px}
.toast.success{border-left:3px solid var(--success)}
.toast.error{border-left:3px solid var(--danger)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.breakdown-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.breakdown-panel{background:var(--surface);border:2px solid var(--accent);border-radius:16px;max-width:700px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;position:relative}
.breakdown-panel h2{font-size:20px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.breakdown-panel .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--text-muted);font-size:24px;cursor:pointer}
.breakdown-panel .close-btn:hover{color:var(--text)}
.breakdown-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.breakdown-item:last-child{border-bottom:none}
.breakdown-item .mini-icon{width:28px;height:28px;border-radius:4px;background:var(--card);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;image-rendering:pixelated}
.breakdown-item .mini-icon img{width:100%;height:100%;object-fit:contain}
.breakdown-item .qty{font-weight:700;color:var(--accent);margin-left:auto;white-space:nowrap}
.breakdown-cat{margin-bottom:12px}
.breakdown-cat-title{font-size:14px;font-weight:600;padding:6px 0;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:6px}
.craft-guide{max-width:800px;margin:0 auto}
.craft-step{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.craft-step-title{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.craft-step .arrow-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.craft-step .arrow-row:last-child{border-bottom:none}
.craft-step .arrow-row .ing{display:flex;align-items:center;gap:6px;font-size:13px}
.craft-step .arrow-row .ing .mini-icon{width:24px;height:24px;border-radius:4px;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;image-rendering:pixelated}
.craft-step .arrow-row .ing .mini-icon img{width:100%;height:100%;object-fit:contain}
.craft-step .arrow-row .arrow{color:var(--accent);font-size:18px;font-weight:700}
.craft-step .arrow-row .method{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--surface);color:var(--text-muted)}
.craft-method-stonecutter{color:#8b7be8}
.craft-method-crafting{color:var(--accent)}
.craft-method-furnace{color:#e85a5a}
@media(max-width:768px){.header{padding:14px 16px}.header h1{font-size:18px}.material-grid{grid-template-columns:1fr}.stats-bar .stat-item{flex:1;min-width:100px;flex-direction:column;align-items:flex-start;gap:4px;padding:10px 14px}.stats-bar .stat-item .num{font-size:22px}}
@media(max-width:480px){.stats-bar{flex-direction:column;gap:8px}.stat-item{flex:none;width:100%}}
</style>
</head>
<body>

<div class="header">
  <h1><span>⛏️</span> 建材清单 <span id="allDoneBadge" style="display:none;font-size:12px;background:var(--success);padding:2px 8px;border-radius:10px">✅ 全部收集</span></h1>
  <div class="header-controls">
    <button class="btn btn-secondary" onclick="toggleSampleData()">📥 加载示例</button>
    <button class="btn btn-secondary" onclick="showCraftGuide()">🧭 合成指导</button>
    <button class="btn btn-secondary" onclick="clearAllData()">🗑️ 清空</button>
  </div>
</div>

<div class="main" id="app">
  <div class="upload-area" id="uploadArea">
    <div class="icon">📂</div>
    <h2>上传建筑材料清单</h2>
    <p>支持 JSON 或 CSV 格式</p>
    <div class="hint">拖拽或点击选择 · 数据自动保存</div>
    <input type="file" id="fileInput" accept=".json,.csv,.txt" multiple>
  </div>

  <div class="data-source-info" id="dataSourceInfo" style="display:none">
    <span>📄</span><span id="dataSourceText"></span>
    <span style="margin-left:auto;font-size:12px;color:var(--text-muted)">已持久化存储</span>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-item"><span class="num" id="statRaw">0</span><div><div class="label">原材料</div><div class="sub" id="statCollect"></div></div></div>
    <div class="stat-item"><span class="num" id="statTotal">0</span><div><div class="label">总需数量</div><div class="sub" id="statTotalFmt"></div></div></div>
    <div class="stat-item"><span class="num" id="statBase">0</span><div><div class="label">基础材料</div><div class="sub">分解后种类</div></div></div>
    <div class="stat-item"><span class="num" id="statGroups">0</span><div><div class="label">分类</div><div class="sub">材料大类</div></div></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索材料..." oninput="renderData()">
    <div class="filter-group" id="filterGroup"></div>
    <div class="view-toggle">
      <button class="active" onclick="setViewMode('card')" id="viewCard">📇 卡片</button>
      <button onclick="setViewMode('list')" id="viewList">📋 列表</button>
      <button onclick="setViewMode('raw')" id="viewRaw">🧱 基础材料</button>
    </div>
  </div>

  <div id="content">
    <div class="empty-state">
      <div class="icon">🏗️</div>
      <h3>还没有加载数据</h3>
      <p>上传 Minecraft 建材清单文件即可查看。<br>✅ 点击卡片上的方框标记已收集的材料。</p>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<div id="breakdownModal" style="display:none" class="breakdown-modal" onclick="if(event.target===this)closeBreakdown()">
  <div class="breakdown-panel">
    <button class="close-btn" onclick="closeBreakdown()">✕</button>
    <h2 id="breakdownTitle">📦 材料分解</h2>
    <div id="breakdownContent"></div>
  </div>
</div>

function autoCN(n){
  if(AT_ITEM[n])return AT_ITEM[n];
  // 尝试后缀匹配
  for(const[suf,cn]of Object.entries(AT_SUF)){
    if(n.endsWith('_'+suf)){
      const pre=n.slice(0,-suf.length-1);
      const pn=autoCN(pre);
      return pn ? pn+cn : null;
    }
    if(n===suf)return cn;
  }
  // 检测前缀
  for(const[pre,cn]of Object.entries(AT_PRE)){
    if(n.startsWith(pre+'_')){
      const rest=n.slice(pre.length+1);
      const rn=autoCN(rest);
      if(rn)return cn+rn;
    }
  }
  // 检测颜色前缀
  const us=n.indexOf('_');
  if(us>0){
    const first=n.slice(0,us),rest=n.slice(us+1);
    if(AT_COL[first]){const rn=autoCN(rest);if(rn)return AT_COL[first]+rn}
    if(AT_WOOD[first]){const rn=autoCN(rest);if(rn)return AT_WOOD[first]+rn}
    if(AT_MAT[first]){const rn=autoCN(rest);if(rn)return AT_MAT[first]+rn}
  }
  return null;
}

function fmtQty(c){
  const SH=27*64;const bx=Math.floor(c/SH);const r=c%SH;const st=Math.floor(r/64);const it=Math.round(r%64);
  const p=[];
  if(bx>0)p.push('<b style=color:#e0a832>'+bx+'</b><span style=font-size:12px>盒</span>');
  if(st>0)p.push('<b style=color:#5c9e5c>'+st+'</b><span style=font-size:12px>组</span>');
  if(it>0)p.push('<span style=color:#9a8e7a;font-weight:600>'+it+'</span><span style=font-size:12px>个</span>');
  return p.join(' ')||'<span style=color:var(--text-muted)>0</span>';
}

let recipeTree=null;
async function loadRT(){
  try{const r=await fetch('recipe-tree.json');recipeTree=await r.json();console.log('📦 配方树',Object.keys(recipeTree.decompose).length,'项')}
  catch(e){console.warn('⚠️ 配方树:',e.message)}
}
function decompose(name,count,useCeil){
  if(!recipeTree||!recipeTree.decompose[name])return{[name]:count};
  // 批量合成处理：useCeil 时按整批次计算（如 6 木板做 3 门）
  if(useCeil&&recipeTree.batch&&recipeTree.batch[name]){
    const batch=recipeTree.batch[name];
    const ing=Object.keys(batch).find(k=>k!=='output');
    if(ing&&batch[ing]&&batch.output){
      const batches=Math.ceil(count/batch.output);
      return decompose(ing,batches*batch[ing],true);
    }
  }
  const r={};
  for(const[base,ratio]of Object.entries(recipeTree.decompose[name])){
    const next=useCeil?Math.ceil(ratio*count):ratio*count;
    const sub=decompose(base,next,useCeil);
    for(const[k,v]of Object.entries(sub))r[k]=(r[k]||0)+v;
  }
  return r;
}

const CL={'🪵':'🪵 木材/原木','🔩':'🔩 金属/矿物','🪨':'🪨 石质材料','🧱':'🧱 砖/混凝土','🏖️':'🏖️ 沙/砾/玻璃','🌿':'🌿 植被/自然','🔥':'🔥 照明/燃料','🎨':'🎨 装饰/染料','📦':'📦 其他'};

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify({rawData,csvNameMap,collected:[...collected]}))}catch(e){}}
function load(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){const d=JSON.parse(r);rawData=d.rawData||[];csvNameMap=d.csvNameMap||{};collected=new Set(d.collected||[]);return true}}catch(e){}return false}
function clearD(){localStorage.removeItem(STORAGE_KEY);rawData=[];csvNameMap={};collected=new Set()}

// ============================================================
// CSV
// ============================================================
function parseCSV(t){
  const l=t.trim().split('\n');if(l.length<2)return{};
  const h=CSVLine(l[0]);const ni=h.findIndex(x=>x==='Item'),ti=h.findIndex(x=>x==='Total');
  if(ni===-1||ti===-1)return{};const m={};
  for(let i=1;i<l.length;i++){const c=CSVLine(l[i]);if(c[ni])m[c[ni].trim()]=parseInt(c[ti])||0}
  return m;
}
function CSVLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){if(q&&i+1<l.length&&l[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){r.push(c);c=''}else c+=ch}r.push(c);return r}
function parseTXT(t){
  const lines=t.split('\n');let hd=false,ci=-1,ti=-1;const m={};
  for(const raw of lines){
    const s=raw.trim();
    if(!s.startsWith('|')||s.startsWith('+-'))continue;
    const c=s.split('|').map(x=>x.trim()).filter(x=>x);
    if(!hd){const ii=c.indexOf('Item'),tj=c.indexOf('Total');if(ii>-1&&tj>-1){hd=true;ci=ii;ti=tj}continue}
    if(c.length<=Math.max(ci,ti))continue;
    const nm=c[ci],ct=parseInt(c[ti])||0;
    if(nm&&ct>0)m[nm]=ct;
  }
  return m;
}

// ============================================================
// DATA PROCESSING
// ============================================================
function processData(){
  if(!rawData||!rawData.length)return[];const m=new Map();
  for(const e of rawData){const rid=e.RawItem;if(!m.has(rid))m.set(rid,{RawItem:rid,TotalEstimate:0,Results:new Map()});const rec=m.get(rid);rec.TotalEstimate+=e.TotalEstimate||0;if(e.Results)for(const r of e.Results){const ex=rec.Results.get(r.ResultItem);if(ex)ex.ResultTotal+=r.ResultTotal;else rec.Results.set(r.ResultItem,{...r})}}
  const r=[];for(const[rid,rec]of m){r.push({RawItem:rec.RawItem,TotalEstimate:rec.TotalEstimate,Results:Array.from(rec.Results.values()),ChineseName:getName(rid),Category:getCategory(rid),collected:collected.has(rid)})}
  for(const i of r){const cs=csvNameMap[i.ChineseName];if(cs)i.TotalEstimate=Math.max(i.TotalEstimate,cs)}
  return r.sort((a,b)=>b.TotalEstimate-a.TotalEstimate);
}
function totalBreakdown(items){
  if(!recipeTree)return null;const t={};
  for(const i of items){const d=decompose(shortName(i.RawItem),i.TotalEstimate);for(const[k,v]of Object.entries(d))t[k]=(t[k]||0)+v}
  return t;
}

// 判定物品的合成方式
function getCraftMethod(itemId){
  const id=shortName(itemId);
  const isStone=id.includes('deepslate')||id.includes('stone')||id.includes('cobbled')||id.includes('cobblestone')||id.includes('granite')||id.includes('diorite')||id.includes('andesite')||id.includes('tuff')||id.includes('basalt')||id.includes('calcite')||id.includes('blackstone')||id.includes('sandstone')||id.includes('quartz')||id.includes('brick')||id.includes('prismarine')||id.includes('end_stone')||id.includes('nether');
  if(isStone&&(id.endsWith('_stairs')||id.endsWith('_slab')||id.endsWith('_wall')||id.startsWith('chiseled_')||id.endsWith('_bricks')||id.endsWith('_tiles')||id.endsWith('_pillar')))return{method:'切石机',mClass:'craft-method-stonecutter'};
  if(id==='glass'||id.includes('brick')&&!id.includes('bricks')||id==='smooth_stone'||id.includes('smooth_'))return{method:'熔炉',mClass:'craft-method-furnace'};
  return{method:'合成台',mClass:'craft-method-crafting'};
}
function showCraftGuide(){
  const items=processData();if(!items.length){showToast('没有数据','error');return}
  const modal=document.getElementById('breakdownModal'),title=document.getElementById('breakdownTitle'),content=document.getElementById('breakdownContent');
  title.innerHTML='🧭 合成指导';
  // 构建反向追溯：基础材料 → 所有消耗它的物品（通过配方树分解）
  const baseConsumers={};
  if(recipeTree){
    for(const item of items){
      const id=shortName(item.RawItem);
      if(!recipeTree.decompose[id])continue;
      const bases=decompose(id,item.TotalEstimate,true);
      for(const[baseId,qty]of Object.entries(bases)){
        if(!baseConsumers[baseId])baseConsumers[baseId]=[];
        baseConsumers[baseId].push({item,baseConsumed:Math.ceil(qty)});
      }
    }
  }
  let h='<div class="craft-guide"><div style="margin-bottom:16px;padding:12px 16px;background:var(--surface);border-radius:8px;border:1px solid var(--accent);font-size:13px;color:var(--text-muted)">从基础材料出发，展示所有合成去向。实线 → 为直接合成，虚线 ⇢ 为经过中间产物的间接合成。</div>';
  for(const item of items){
    const nm=item.ChineseName,id=shortName(item.RawItem),cnt=item.TotalEstimate;
    // 只展示基础材料（配方树中不可进一步分解的原材料）
    if(recipeTree&&recipeTree.decompose[id])continue;
    const im=imgUrl(item.RawItem);
    const res=(item.Results||[]).filter(r=>r.ResultItem!==item.RawItem);
    h+='<div class="craft-step"><div class="craft-step-title"><div class="mini-icon" style="width:28px;height:28px;border-radius:4px;background:var(--surface);display:inline-flex;align-items:center;justify-content:center;overflow:hidden;image-rendering:pixelated"><img class="iimg" src="'+im+'" alt="" loading="lazy" data-iid="'+item.RawItem+'" style="width:100%;height:100%;object-fit:contain"><span class="fb" style="display:none;font-size:14px">'+nm.charAt(0)+'</span></div> '+nm+' <span style="font-weight:400;font-size:12px;color:var(--text-muted)">×'+cnt+'</span></div>';
    // 收集所有下游物品（直接结果 + 间接消耗）
    const seen=new Set(),downstream=[];
    for(const r of res){
      const rid=shortName(r.ResultItem);
      seen.add(rid);
      const m=getCraftMethod(r.ResultItem);
      downstream.push({rid,name:getName(r.ResultItem),qty:r.ResultTotal,method:m.method,mClass:m.mClass,direct:true});
    }
    const consumers=baseConsumers[id]||[];
    for(const c of consumers){
      const cid=shortName(c.item.RawItem);
      if(seen.has(cid))continue;
      seen.add(cid);
      const m=getCraftMethod(c.item.RawItem);
      downstream.push({rid:cid,name:c.item.ChineseName,qty:c.item.TotalEstimate,baseConsumed:c.baseConsumed,method:m.method,mClass:m.mClass,direct:false});
    }
    if(downstream.length===0){h+='<div style="color:var(--text-muted);font-size:13px;padding:8px 0">直接使用，无需合成</div>';h+='</div>';continue}
    // 按方法统计（统计产物种类数，避免不同层级数量叠加）
    const byMethod={};
    for(const d of downstream){
      if(!byMethod[d.method])byMethod[d.method]={qty:0,count:0};
      byMethod[d.method].qty+=d.qty;
      byMethod[d.method].count++;
    }
    let sumHtml=[];
    // 计算消耗：间接消耗（来自配方树）+ 直接结果消耗
    let totalBaseUsed=downstream.reduce((s,d)=>s+(d.baseConsumed||0),0);
    // 将直接结果也分解为基础材料，叠加消耗
    for(const d of downstream){
      if(!d.direct)continue;
      const w=decompose(d.rid,d.qty,true);
      if(w[id])totalBaseUsed+=w[id];
    }
    const du=Math.max(0,Math.round(cnt-totalBaseUsed));
    if(du>0)sumHtml.push('直接使用 '+du+' 个');
    for(const[m,info]of Object.entries(byMethod))sumHtml.push(m+' '+info.count+' 种');
    if(sumHtml.length)h+='<div style="font-size:12px;color:var(--text-muted);padding:6px 0 10px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:6px">'+sumHtml.map(s=>'<span>'+s+'</span>').join('')+'</div>';
    for(const d of downstream){
      const di=imgUrl('minecraft:'+d.rid);
      let extra='',arr='→';
      if(!d.direct){arr='⇢';extra=' <span style="font-size:11px;color:var(--text-muted)">(需 '+d.baseConsumed+' '+nm+')</span>';}
      h+='<div class="arrow-row"><div class="ing"><div class="mini-icon"><img class="iimg" src="'+im+'" alt="" loading="lazy" data-iid="'+item.RawItem+'" style="width:100%;height:100%;object-fit:contain"><span class="fb" style="display:none;font-size:10px">'+nm.charAt(0)+'</span></div>'+nm+'</div>'
        +'<span class="arrow">'+arr+'</span>'
        +'<div class="ing"><div class="mini-icon"><img class="iimg" src="'+di+'" alt="" loading="lazy" data-iid="'+'minecraft:'+d.rid+'" style="width:100%;height:100%;object-fit:contain"><span class="fb" style="display:none;font-size:10px">'+d.name.charAt(0)+'</span></div>'+d.name+' <b style="color:var(--accent2)">×'+d.qty+'</b>'+extra+'</div>'
        +'<span class="method '+d.mClass+'">'+d.method+'</span></div>';
    }
    h+='</div>';
  }
  h+='</div>';
  content.innerHTML=h;modal.style.display='flex';imgFB();
}

function showToast(msg,t){
  const c=document.getElementById('toastContainer');const e=document.createElement('div');e.className='toast '+(t||'info');e.textContent=msg;c.appendChild(e);
  setTimeout(()=>{e.style.opacity='0';e.style.transform='translateX(100%)';e.style.transition='all .3s';setTimeout(()=>e.remove(),300)},3000);
}

// ============================================================
// FILE HANDLING
// ============================================================
function handleFiles(files){
  let p=files.length;if(!p)return;
  for(const f of files){const r=new FileReader();const n=f.name.toLowerCase();
    const isJ=n.endsWith('.json'),isC=n.endsWith('.csv'),isT=n.endsWith('.txt');
    r.onload=function(e){try{const t=e.target.result;
      if(isJ){const d=JSON.parse(t);if(Array.isArray(d)){rawData=d;showToast('✅ JSON: '+f.name+' ('+d.length+' 种)','success')}else showToast('JSON 需为数组','error')}
      else if(isC){const m=parseCSV(t);const cnt=Object.keys(m).length;if(cnt>0){Object.assign(csvNameMap,m);showToast('✅ CSV: '+f.name+' ('+cnt+' 项)','success')}else showToast('CSV 为空','error')}
      else if(isT){const m=parseTXT(t);const cnt=Object.keys(m).length;if(cnt>0){const nr=[];for(const[cn,ct]of Object.entries(m)){const id=CSV_RMAP[cn];if(id)nr.push({RawItem:'minecraft:'+id,TotalEstimate:ct,Results:[]})}if(nr.length>0){if(!rawData)rawData=[];rawData=rawData.concat(nr);showToast('✅ TXT: '+f.name+' ('+nr.length+' 种)','success')}else{Object.assign(csvNameMap,m);showToast('⚠️ TXT: 未能匹配到对应材料','warning')}}else showToast('TXT 未能解析出数据','error')}
    }catch(e){showToast('解析失败: '+e.message,'error')}if(--p===0)finalizeLoad()};
    r.onerror=function(){showToast('读取失败','error');if(--p===0)finalizeLoad()};r.readAsText(f);
  }
}
function finalizeLoad(){save();updateSrc();renderData()}
function updateSrc(){
  const el=document.getElementById('dataSourceInfo'),tx=document.getElementById('dataSourceText');
  if(rawData.length>0||Object.keys(csvNameMap).length>0){el.style.display='flex';const p=[];if(rawData.length>0)p.push('JSON: '+rawData.length+' 种');if(Object.keys(csvNameMap).length>0)p.push(Object.keys(csvNameMap).length+' 项');tx.textContent=p.join(' | ')}
  else el.style.display='none';
}
function toggleSampleData(){rawData=SAMPLE_JSON;csvNameMap=SAMPLE_CSV;save();updateSrc();renderData();showToast('✅ 已加载示例数据','success')}
function clearAllData(){if(!rawData.length&&!Object.keys(csvNameMap).length){showToast('没有数据','info');return}if(!confirm('确定清空？'))return;clearD();updateSrc();renderData();showToast('已清空','info')}
